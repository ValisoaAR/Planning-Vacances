databases:
  - name: itineraire-maroc-db
    databaseName: itineraire_maroc
    plan: free

services:
  - type: web
    name: itineraire-maroc
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /api/trip
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: itineraire-maroc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FAMILY_PIN_HASH
        sync: false
      - key: NODE_ENV
        value: production
