<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maroc du Nord — Itinéraire famille 8 jours</title>
<meta name="description" content="Itinéraire familial de 8 jours dans le nord du Maroc, du 29/07 au 05/08.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
  <div class="header-inner">
    <div class="header-text">
      <h1>Nord du Maroc <span class="header-flag">🇲🇦</span></h1>
      <p class="dates">8 jours en famille · 29 juillet → 05 août · Base : Cabo Negro</p>
    </div>
    <div class="header-actions">
      <button id="auth-toggle" class="auth-btn" type="button">🔒 Édition</button>
      <button id="toggle-list" class="menu-toggle" type="button" aria-expanded="true" aria-controls="days-list" aria-label="Réduire ou afficher la liste des jours">
        <span class="menu-icon" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>
  </div>
</header>

<main class="layout">
  <div id="map" role="region" aria-label="Carte de l'itinéraire"></div>

  <section id="days-list" class="days-list" aria-label="Liste des jours">
    <!-- Bandeau total, éditeur domicile et cartes-jour sont injectés par app.js -->
  </section>
</main>

<footer class="bottom-footer">
  <p>Fond de carte © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">contributeurs OpenStreetMap</a></p>
</footer>

<div id="auth-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <h2>Mode édition</h2>
    <p class="modal-hint">Entre le PIN familial pour modifier le domicile et les trajets.</p>
    <form id="auth-form">
      <input type="password" id="pin-input" inputmode="numeric" placeholder="PIN famille" autocomplete="off" required>
      <p id="auth-error" class="auth-error" hidden></p>
      <div class="modal-actions">
        <button type="button" id="auth-cancel" class="btn-secondary">Annuler</button>
        <button type="submit" class="btn-primary">Se connecter</button>
      </div>
    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
