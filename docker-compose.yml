services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maroc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maroc}
      POSTGRES_DB: ${POSTGRES_DB:-itineraire_maroc}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maroc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maroc}:${POSTGRES_PASSWORD:-maroc}@db:5432/${POSTGRES_DB:-itineraire_maroc}
      JWT_SECRET: ${JWT_SECRET}
      FAMILY_PIN_HASH: ${FAMILY_PIN_HASH}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"

volumes:
  db_data:
